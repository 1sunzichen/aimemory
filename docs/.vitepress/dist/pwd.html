<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>今日密码</title>
  <style>
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #f5f5f0;
      font-family: -apple-system, "PingFang SC", sans-serif;
    }
    .wrap { text-align: center; }
    .date { font-size: 13px; color: #bbb; margin-bottom: 12px; }
    .pwd {
      font-size: 48px; font-weight: 700; letter-spacing: 10px;
      color: #1a1a1a; cursor: pointer; user-select: all;
    }
    .hint { font-size: 12px; color: #ccc; margin-top: 12px; }
    .copied { color: #888; font-size: 13px; margin-top: 10px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="date" id="date"></div>
    <div class="pwd" id="pwd" onclick="copy()">···</div>
    <div class="hint">点击复制</div>
    <div class="copied" id="copied"></div>
  </div>
  <script>
    const _S = "极染悟心";

    function today() {
      const d = new Date();
      return d.getFullYear().toString()
        + String(d.getMonth()+1).padStart(2,"0")
        + String(d.getDate()).padStart(2,"0");
    }

    async function sha256(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    }

    async function init() {
      const hash = await sha256(_S + today());
      const pwd  = hash.slice(0,6).toUpperCase();
      document.getElementById("pwd").textContent = pwd;
      document.getElementById("date").textContent =
        new Date().toLocaleDateString("zh-CN", {year:"numeric",month:"long",day:"numeric"});
    }

    function copy() {
      const pwd = document.getElementById("pwd").textContent;
      navigator.clipboard.writeText(pwd).then(() => {
        const el = document.getElementById("copied");
        el.textContent = "✅ 已复制";
        setTimeout(() => el.textContent = "", 2000);
      });
    }

    init();
  </script>
</body>
</html>
