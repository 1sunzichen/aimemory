<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日记</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f5f5f0;
      font-family: -apple-system, "PingFang SC", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.08);
      padding: 48px 36px;
      width: 320px;
      text-align: center;
    }
    .card h2 { font-size: 32px; margin-bottom: 6px; }
    .card .sub { color: #aaa; font-size: 13px; margin-bottom: 28px; }
    input {
      width: 100%;
      padding: 13px 16px;
      font-size: 20px;
      letter-spacing: 6px;
      text-align: center;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      outline: none;
      text-transform: uppercase;
    }
    input:focus { border-color: #333; }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { background: #444; }
    .err { margin-top: 12px; color: #e44; font-size: 13px; min-height: 18px; }
    #diary {
      display: none;
      max-width: 680px;
      margin: 48px auto;
      padding: 0 24px 80px;
    }
    #diary h1 { font-size: 20px; color: #111; margin-bottom: 4px; }
    #diary .meta { color: #bbb; font-size: 13px; margin-bottom: 32px; }
    #diary .body { font-size: 16px; line-height: 2; color: #333; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <div class="card" id="lock">
    <h2>📔</h2>
    <p class="sub">今日密码</p>
    <input id="pwd" type="password" maxlength="6" placeholder="······" autocomplete="off" />
    <button onclick="unlock()">进入</button>
    <p class="err" id="err"></p>
  </div>

  <div id="diary">
    <h1>日记</h1>
    <p class="meta" id="diary-date"></p>
    <div class="body" id="diary-body"></div>
  </div>

  <script>
    const _S = "极染悟心";

    function today() {
      const d = new Date();
      return d.getFullYear().toString()
        + String(d.getMonth() + 1).padStart(2, "0")
        + String(d.getDate()).padStart(2, "0");
    }

    async function sha256(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    }

    document.getElementById("pwd").addEventListener("keydown", e => {
      if (e.key === "Enter") unlock();
    });

    async function unlock() {
      const input = document.getElementById("pwd").value.trim().toUpperCase();
      const err = document.getElementById("err");
      err.textContent = "";

      if (input.length !== 6) { err.textContent = "请输入6位密码"; return; }

      const hash = await sha256(_S + today());
      if (input !== hash.slice(0, 6).toUpperCase()) {
        err.textContent = "密码错误";
        return;
      }

      // 读取 localStorage 内容
      const raw = localStorage.getItem("diary_latest");
      document.getElementById("lock").style.display = "none";
      document.getElementById("diary").style.display = "block";
      document.getElementById("diary-date").textContent =
        new Date().toLocaleDateString("zh-CN", { year:"numeric", month:"long", day:"numeric", weekday:"long" });

      if (raw) {
        const { content } = JSON.parse(raw);
        document.getElementById("diary-body").textContent = content || "（今天还没有写日记）";
      } else {
        document.getElementById("diary-body").textContent = "（今天还没有写日记）";
      }
    }
  </script>
</body>
</html>
