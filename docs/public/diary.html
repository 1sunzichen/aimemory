<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日记</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f5f5f0;
      font-family: -apple-system, "PingFang SC", sans-serif;
    }

    /* ── 锁屏 ── */
    #lock {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.08);
      padding: 48px 36px;
      width: 320px;
      text-align: center;
    }
    .card h2 { font-size: 32px; margin-bottom: 6px; }
    .card .sub { color: #aaa; font-size: 13px; margin-bottom: 28px; }
    .card input {
      width: 100%;
      padding: 13px 16px;
      font-size: 20px;
      letter-spacing: 6px;
      text-align: center;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      outline: none;
      text-transform: uppercase;
    }
    .card input:focus { border-color: #333; }
    .card button {
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }
    .card button:hover { background: #444; }
    .err { margin-top: 12px; color: #e44; font-size: 13px; min-height: 18px; }

    /* ── 主界面 ── */
    #main { display: none; max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .top-bar h1 { font-size: 20px; color: #111; }
    .view-toggle {
      display: flex;
      background: #eee;
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .view-toggle button {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      background: transparent;
      color: #888;
    }
    .view-toggle button.active { background: #fff; color: #111; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    /* ── 列表视图 ── */
    #list-view {}
    .entry-item {
      background: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: box-shadow .15s;
    }
    .entry-item:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .entry-item .e-date { font-size: 13px; color: #aaa; margin-bottom: 4px; }
    .entry-item .e-preview { font-size: 15px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .empty { text-align: center; color: #bbb; padding: 60px 0; font-size: 15px; }

    /* ── 日历视图 ── */
    #cal-view { display: none; }
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .cal-nav button {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #555;
      padding: 4px 10px;
      border-radius: 6px;
    }
    .cal-nav button:hover { background: #eee; }
    .cal-nav .cal-title { font-size: 16px; font-weight: 600; color: #111; }
    .cal-grid {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #f9f9f9;
      border-bottom: 1px solid #eee;
    }
    .cal-weekdays span {
      text-align: center;
      padding: 10px 0;
      font-size: 12px;
      color: #aaa;
    }
    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .cal-day {
      min-height: 56px;
      padding: 8px 6px 6px;
      border-right: 1px solid #f0f0f0;
      border-bottom: 1px solid #f0f0f0;
      cursor: default;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .cal-day:nth-child(7n) { border-right: none; }
    .cal-day.has-entry { cursor: pointer; }
    .cal-day.has-entry:hover { background: #f5f5f0; }
    .cal-day.today .day-num {
      background: #1a1a1a;
      color: #fff;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-day .day-num { font-size: 14px; color: #333; line-height: 1; }
    .cal-day.other-month .day-num { color: #ddd; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: #1a1a1a; margin-top: 4px; }
    .cal-day.other-month .dot { background: #ccc; }

    /* ── 日记详情 ── */
    #entry-view { display: none; }
    .back-btn {
      background: none;
      border: none;
      font-size: 14px;
      color: #888;
      cursor: pointer;
      padding: 0;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .back-btn:hover { color: #333; }
    #entry-view h2 { font-size: 20px; color: #111; margin-bottom: 4px; }
    #entry-view .e-meta { color: #bbb; font-size: 13px; margin-bottom: 28px; }
    #entry-view .e-body { font-size: 16px; line-height: 2; color: #333; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>

<!-- 锁屏 -->
<div id="lock">
  <div class="card">
    <h2>📔</h2>
    <p class="sub">今日密码</p>
    <input id="pwd" type="password" maxlength="6" placeholder="······" autocomplete="off" />
    <button onclick="unlock()">进入</button>
    <p class="err" id="err"></p>
  </div>
</div>

<!-- 主界面 -->
<div id="main">
  <div class="top-bar">
    <h1>📔 日记</h1>
    <div class="view-toggle">
      <button id="btn-list" class="active" onclick="switchView('list')">列表</button>
      <button id="btn-cal" onclick="switchView('cal')">日历</button>
    </div>
  </div>

  <!-- 列表视图 -->
  <div id="list-view"></div>

  <!-- 日历视图 -->
  <div id="cal-view">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="cal-title" id="cal-title"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-weekdays">
        <span>日</span><span>一</span><span>二</span><span>三</span>
        <span>四</span><span>五</span><span>六</span>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
  </div>

  <!-- 日记详情 -->
  <div id="entry-view">
    <button class="back-btn" onclick="backToMain()">← 返回</button>
    <h2 id="entry-title"></h2>
    <p class="e-meta" id="entry-meta"></p>
    <div class="e-body" id="entry-body"></div>
  </div>
</div>

<script>
  const _S = "极染悟心";
  let _calYear, _calMonth, _entries = {};

  // ── 工具 ──────────────────────────────────────────────────────
  function todayKey() {
    const d = new Date();
    return d.getFullYear().toString()
      + String(d.getMonth()+1).padStart(2,"0")
      + String(d.getDate()).padStart(2,"0");
  }

  async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  function keyToDate(key) {
    // "20260521" → Date
    return new Date(+key.slice(0,4), +key.slice(4,6)-1, +key.slice(6,8));
  }

  function keyToLabel(key) {
    return keyToDate(key).toLocaleDateString("zh-CN", {year:"numeric",month:"long",day:"numeric",weekday:"long"});
  }

  function loadEntries() {
    const entries = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (/^diary_\d{8}$/.test(k)) {
        const dateKey = k.replace("diary_","");
        const content = localStorage.getItem(k);
        if (content && content.trim()) entries[dateKey] = content;
      }
    }
    return entries;
  }

  // ── 解锁 ──────────────────────────────────────────────────────
  document.getElementById("pwd").addEventListener("keydown", e => {
    if (e.key === "Enter") unlock();
  });

  async function unlock() {
    const input = document.getElementById("pwd").value.trim().toUpperCase();
    const err   = document.getElementById("err");
    err.textContent = "";

    if (input.length !== 6) { err.textContent = "请输入6位密码"; return; }

    const hash = await sha256(_S + todayKey());
    if (input !== hash.slice(0,6).toUpperCase()) { err.textContent = "密码错误"; return; }

    _entries = loadEntries();
    document.getElementById("lock").style.display = "none";
    document.getElementById("main").style.display = "block";

    const now = new Date();
    _calYear  = now.getFullYear();
    _calMonth = now.getMonth();

    renderList();
    renderCalendar();
  }

  // ── 切换视图 ──────────────────────────────────────────────────
  function switchView(v) {
    document.getElementById("list-view").style.display = v === "list" ? "block" : "none";
    document.getElementById("cal-view").style.display  = v === "cal"  ? "block" : "none";
    document.getElementById("entry-view").style.display = "none";
    document.getElementById("btn-list").className = v === "list" ? "active" : "";
    document.getElementById("btn-cal").className  = v === "cal"  ? "active" : "";
  }

  // ── 列表 ──────────────────────────────────────────────────────
  function renderList() {
    const el   = document.getElementById("list-view");
    const keys = Object.keys(_entries).sort((a,b) => b.localeCompare(a));

    if (!keys.length) {
      el.innerHTML = '<p class="empty">还没有日记</p>';
      return;
    }

    el.innerHTML = keys.map(k => {
      const preview = _entries[k].split("\n")[0].slice(0,60);
      const label   = keyToDate(k).toLocaleDateString("zh-CN", {year:"numeric",month:"long",day:"numeric"});
      return `<div class="entry-item" onclick="openEntry('${k}')">
        <div class="e-date">${label}</div>
        <div class="e-preview">${preview || "（无内容）"}</div>
      </div>`;
    }).join("");
  }

  // ── 日历 ──────────────────────────────────────────────────────
  function renderCalendar() {
    const months = ["一月","二月","三月","四月","五月","六月",
                    "七月","八月","九月","十月","十一月","十二月"];
    document.getElementById("cal-title").textContent = `${_calYear} 年 ${months[_calMonth]}`;

    const today = new Date();
    const firstDay = new Date(_calYear, _calMonth, 1).getDay();
    const daysInMonth = new Date(_calYear, _calMonth+1, 0).getDate();
    const daysInPrev  = new Date(_calYear, _calMonth, 0).getDate();

    let html = "";

    // 上月补位
    for (let i = firstDay - 1; i >= 0; i--) {
      const d    = daysInPrev - i;
      const key  = prevMonthKey(d);
      const has  = !!_entries[key];
      html += `<div class="cal-day other-month${has?" has-entry":""}" ${has?`onclick="openEntry('${key}')"`:""}><span class="day-num">${d}</span>${has?'<span class="dot"></span>':""}</div>`;
    }

    // 本月
    for (let d = 1; d <= daysInMonth; d++) {
      const key   = dateToKey(_calYear, _calMonth, d);
      const has   = !!_entries[key];
      const isToday = today.getFullYear()===_calYear && today.getMonth()===_calMonth && today.getDate()===d;
      html += `<div class="cal-day${has?" has-entry":""}${isToday?" today":""}" ${has?`onclick="openEntry('${key}')"`:""}><span class="day-num">${d}</span>${has?'<span class="dot"></span>':""}</div>`;
    }

    // 补足 6 行
    const total = firstDay + daysInMonth;
    const remaining = (Math.ceil(total/7)*7) - total;
    for (let d = 1; d <= remaining; d++) {
      const key = nextMonthKey(d);
      const has = !!_entries[key];
      html += `<div class="cal-day other-month${has?" has-entry":""}" ${has?`onclick="openEntry('${key}')"`:""}><span class="day-num">${d}</span>${has?'<span class="dot"></span>':""}</div>`;
    }

    document.getElementById("cal-days").innerHTML = html;
  }

  function dateToKey(y, m, d) {
    return y.toString() + String(m+1).padStart(2,"0") + String(d).padStart(2,"0");
  }
  function prevMonthKey(d) {
    const pm = _calMonth === 0 ? 11 : _calMonth-1;
    const py = _calMonth === 0 ? _calYear-1 : _calYear;
    return dateToKey(py, pm, d);
  }
  function nextMonthKey(d) {
    const nm = _calMonth === 11 ? 0 : _calMonth+1;
    const ny = _calMonth === 11 ? _calYear+1 : _calYear;
    return dateToKey(ny, nm, d);
  }

  function changeMonth(delta) {
    _calMonth += delta;
    if (_calMonth > 11) { _calMonth = 0;  _calYear++; }
    if (_calMonth < 0)  { _calMonth = 11; _calYear--; }
    renderCalendar();
  }

  // ── 详情 ──────────────────────────────────────────────────────
  function openEntry(key) {
    document.getElementById("list-view").style.display  = "none";
    document.getElementById("cal-view").style.display   = "none";
    document.getElementById("entry-view").style.display = "block";

    document.getElementById("entry-title").textContent = keyToDate(key).toLocaleDateString("zh-CN", {year:"numeric",month:"long",day:"numeric"});
    document.getElementById("entry-meta").textContent  = keyToDate(key).toLocaleDateString("zh-CN", {weekday:"long"});
    document.getElementById("entry-body").textContent  = _entries[key] || "（无内容）";
  }

  function backToMain() {
    document.getElementById("entry-view").style.display = "none";
    const active = document.getElementById("btn-list").classList.contains("active") ? "list" : "cal";
    switchView(active);
  }
</script>
</body>
</html>
