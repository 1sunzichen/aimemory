<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>写日记</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f5f0;
      font-family: -apple-system, "PingFang SC", sans-serif;
      min-height: 100vh;
      padding: 48px 24px 80px;
    }
    .wrap { max-width: 680px; margin: 0 auto; }
    h1 { font-size: 20px; color: #111; margin-bottom: 4px; }
    .meta { color: #bbb; font-size: 13px; margin-bottom: 20px; }
    textarea {
      width: 100%;
      min-height: 480px;
      padding: 20px;
      font-size: 16px;
      line-height: 2;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      resize: vertical;
      outline: none;
      font-family: inherit;
      color: #333;
      background: #fff;
    }
    textarea:focus { border-color: #333; }
    .actions { display: flex; gap: 12px; margin-top: 14px; align-items: center; }
    button {
      padding: 12px 28px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { background: #444; }
    .status { font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📔 今日日记</h1>
    <p class="meta" id="date-label"></p>
    <textarea id="editor" placeholder="今天发生了什么……"></textarea>
    <div class="actions">
      <button onclick="save()">保存</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <script>
    const KEY = "diary_" + today();

    function today() {
      const d = new Date();
      return d.getFullYear().toString()
        + String(d.getMonth() + 1).padStart(2, "0")
        + String(d.getDate()).padStart(2, "0");
    }

    // 显示日期
    document.getElementById("date-label").textContent =
      new Date().toLocaleDateString("zh-CN", { year:"numeric", month:"long", day:"numeric", weekday:"long" });

    // 读取今天已有内容
    const saved = localStorage.getItem(KEY);
    if (saved) document.getElementById("editor").value = saved;

    function save() {
      const content = document.getElementById("editor").value;
      localStorage.setItem(KEY, content);
      // 同时存一份供 diary.html 读取（明文，按日期key存）
      localStorage.setItem("diary_latest", JSON.stringify({ date: today(), content }));
      const s = document.getElementById("status");
      s.textContent = "✅ 已保存 " + new Date().toLocaleTimeString("zh-CN");
    }

    // Ctrl+S 保存
    document.addEventListener("keydown", e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); save(); }
    });
  </script>
</body>
</html>
